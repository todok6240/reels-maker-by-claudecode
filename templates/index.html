{% extends "base.html" %}
{% block content %}

<div class="container">
  <!-- Step 1: 사진 확인 & 분석 -->
  <section class="card" id="step1">
    <h2>1단계 — 사진 분석</h2>
    <div id="photo-list" class="photo-grid"></div>
    <button class="btn btn-primary" id="btn-analyze">Claude로 분석 시작</button>
  </section>

  <!-- Step 2: 분석 결과 & 맛집 정보 입력 -->
  <section class="card hidden" id="step2">
    <h2>2단계 — 맛집 정보 입력</h2>
    <div id="analysis-result" class="analysis-box"></div>
    <div class="form-group">
      <label>맛집 이름</label>
      <input type="text" id="name" placeholder="예: 두동 쭈꾸미">
    </div>
    <div class="form-group">
      <label>위치</label>
      <input type="text" id="location" placeholder="예: 서울 용두동">
    </div>
    <div class="form-group">
      <label>가격대</label>
      <input type="text" id="price" placeholder="예: 1인 12,000원">
    </div>
    <div class="form-group">
      <label>한 줄 총평</label>
      <input type="text" id="review" placeholder="예: 불맛 가득한 진짜 쭈꾸미 맛집">
    </div>
    <button class="btn btn-primary" id="btn-generate">자막 생성</button>
  </section>

  <!-- Step 3: 자막 확인 & 영상 생성 -->
  <section class="card hidden" id="step3">
    <h2>3단계 — 자막 확인 & 영상 생성</h2>
    <div id="captions-list" class="captions-box"></div>
    <button class="btn btn-success" id="btn-make">영상 생성 시작</button>
  </section>

  <!-- 진행 상태 -->
  <section class="card hidden" id="step4">
    <h2>영상 생성 중...</h2>
    <div class="progress-bar"><div id="progress-fill"></div></div>
    <p id="progress-msg"></p>
  </section>
</div>

{% endblock %}
