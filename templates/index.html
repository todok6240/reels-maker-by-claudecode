{% extends "base.html" %}
{% block content %}

<div class="container">

  <!-- 이어서 진행 배너 -->
  <div id="resume-banner" class="banner-resume hidden">
    <span>이전 작업 파일이 있어요. 이어서 진행할까요?</span>
    <div class="banner-actions">
      <button class="btn btn-outline" id="btn-resume">이어서 진행</button>
      <button class="btn btn-danger" id="btn-reset">새 작업 시작</button>
    </div>
  </div>

  <!-- Step 1: 사진 업로드 & 분석 -->
  <section class="card" id="step1">
    <h2>1단계 — 사진 업로드 & 분석</h2>

    <div id="drop-zone">
      <input type="file" id="file-input" multiple accept="image/*,video/*" hidden>
      <div id="drop-inner" onclick="document.getElementById('file-input').click()">
        <div class="drop-icon">📷</div>
        <p class="drop-title">사진을 드래그하거나 클릭해서 업로드</p>
        <p class="drop-sub">JPG, PNG, MP4, MOV 여러 파일 가능</p>
      </div>
    </div>

    <div id="upload-progress" class="hidden">
      <div class="progress-bar"><div id="upload-fill"></div></div>
      <p id="upload-msg"></p>
    </div>

    <div id="photo-list" class="photo-grid"></div>
    <button class="btn btn-primary" id="btn-next" disabled>다음 단계 →</button>
  </section>

  <!-- Step 1.5: 사진 순서 조정 -->
  <section class="card hidden" id="step1-5">
    <h2>1.5단계 — 사진 순서 조정</h2>
    <p class="step-desc">드래그로 순서를 바꾸거나 삭제할 수 있어요. 추가 사진은 오른쪽 끝에 붙어요.</p>
    <div id="sort-zone" class="sort-zone"></div>
    <div class="step-actions">
      <label class="btn btn-outline" id="btn-add-more">
        + 사진 추가
        <input type="file" id="file-input-more" multiple accept="image/*,video/*" hidden>
      </label>
      <button class="btn btn-outline" id="btn-sort-time">🕐 시간순 정렬</button>
      <button class="btn btn-primary" id="btn-analyze">Claude로 분석 시작</button>
    </div>
  </section>

  <!-- Step 2: 분석 결과 & 맛집 정보 입력 -->
  <section class="card hidden" id="step2">
    <h2>2단계 — 맛집 정보 입력</h2>
    <div id="analysis-result" class="analysis-box"></div>
    <div class="form-group">
      <label>맛집 이름</label>
      <input type="text" id="name" placeholder="예: 두동 쭈꾸미">
    </div>
    <div class="form-group">
      <label>위치</label>
      <input type="text" id="location" placeholder="예: 서울 용두동">
    </div>
    <div class="form-group">
      <label>가격대</label>
      <input type="text" id="price" placeholder="예: 1인 12,000원">
    </div>
    <div class="form-group">
      <label>한 줄 총평</label>
      <input type="text" id="review" placeholder="예: 불맛 가득한 진짜 쭈꾸미 맛집">
    </div>
    <button class="btn btn-primary" id="btn-generate">자막 생성</button>
  </section>

  <!-- Step 3: 자막 확인 & 영상 생성 -->
  <section class="card hidden" id="step3">
    <h2>3단계 — 자막 확인 & 영상 생성</h2>
    <div id="captions-list" class="captions-box"></div>
    <button class="btn btn-success" id="btn-make">영상 생성 시작</button>
  </section>

  <!-- 진행 상태 -->
  <section class="card hidden" id="step4">
    <h2>영상 생성 중...</h2>
    <div class="progress-bar"><div id="progress-fill"></div></div>
    <p id="progress-msg"></p>
  </section>
</div>

{% endblock %}
