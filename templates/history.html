{% extends "base.html" %}
{% block content %}

<div class="container">
  <section class="card">
    <h2>히스토리</h2>
    {% if restaurants %}
    <table class="history-table">
      <thead>
        <tr>
          <th>#</th>
          <th>맛집 이름</th>
          <th>위치</th>
          <th>가격대</th>
          <th>세션</th>
          <th>생성일</th>
        </tr>
      </thead>
      <tbody>
        {% for r in restaurants %}
        <tr>
          <td>{{ r.id }}</td>
          <td>{{ r.name }}</td>
          <td>{{ r.location }}</td>
          <td>{{ r.price }}</td>
          <td class="session-id">{{ r.session_id[:8] }}...</td>
          <td>{{ r.created_at }}</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
    {% else %}
    <p class="empty">아직 생성된 릴스가 없어요.</p>
    {% endif %}
  </section>
</div>

{% endblock %}
