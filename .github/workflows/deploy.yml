name: Deploy to Naver Cloud

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH 접속 후 배포
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /root/reels-maker-by-claudecode
            git pull origin master
            venv/bin/pip install -r requirements.txt --quiet
            venv/bin/python3 -c "from database import init_db; init_db(); print('DB 마이그레이션 완료')"
            systemctl restart rsmaker
            cp /root/reels-maker-by-claudecode/nginx.conf /etc/nginx/sites-available/rsmaker
            systemctl reload nginx
            echo "✅ 배포 완료"
